name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy Docker Compose stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH || 'main' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" << EOF
            set -euo pipefail

            cd "$VPS_PATH"

            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            mkdir -p public/uploads queue
            chmod 755 public/uploads queue

            docker compose -f docker-compose-vps.yml build app worker
            docker compose -f docker-compose-vps.yml up -d --remove-orphans
            docker compose -f docker-compose-vps.yml exec -T app npx prisma db push

            docker compose -f docker-compose-vps.yml ps
            curl -fsS http://127.0.0.1:3033/auth/signin >/dev/null
            docker image prune -f
          EOF
